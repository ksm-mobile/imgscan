<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport"
content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover" />

<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="theme-color" content="#111827" />

<title>Scanner App</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
html,
body {
margin: 0;
padding: 0;
overflow: hidden;
background: #000;
font-family: sans-serif;
height: 100%;
width: 100%;
touch-action: none;
}

#video,
#canvas {
position: absolute;
inset: 0;
width: 100%;
height: 100%;
object-fit: cover;
}

.spinner {
border: 4px solid rgba(255,255,255,0.2);
border-top: 4px solid #10b981;
border-radius: 50%;
width: 40px;
height: 40px;
animation: spin 1s linear infinite;
}

@keyframes spin {
0% { transform: rotate(0deg); }
100% { transform: rotate(360deg); }
}
</style>
</head>

<body>

<!-- Loading -->
<div id="loading"
class="fixed inset-0 bg-black flex flex-col items-center justify-center text-white z-50">
<div class="spinner mb-4"></div>
<p id="loadingText">Loading OpenCV...</p>
</div>

<!-- Start Screen -->
<div id="startScreen"
class="fixed inset-0 bg-black flex items-center justify-center z-40 hidden">
<button id="startBtn"
class="bg-emerald-500 text-white px-8 py-4 rounded-2xl text-xl font-bold">
Start Camera
</button>
</div>

<!-- Scanner -->
<div id="scanner" class="hidden fixed inset-0 bg-black">

<video
id="video"
autoplay
muted
playsinline
></video>

<canvas id="canvas"></canvas>

<div class="absolute inset-0 border border-white/20 m-6 rounded-2xl pointer-events-none"></div>

<button id="captureBtn"
class="absolute bottom-10 left-1/2 -translate-x-1/2
w-20 h-20 rounded-full bg-white border-4 border-gray-300 z-20">
</button>

</div>

<!-- Result -->
<div id="result"
class="hidden fixed inset-0 bg-black z-50 flex flex-col">

<div class="p-4 bg-white flex justify-between items-center">
<button id="retakeBtn" class="font-bold text-black">
Retake
</button>

<button id="saveBtn"
class="bg-emerald-500 text-white px-4 py-2 rounded-xl font-bold">
Save
</button>
</div>

<div class="flex-1 overflow-auto bg-gray-200 flex items-center justify-center">
<canvas id="resultCanvas" class="max-w-full"></canvas>
</div>

</div>

<script async src="https://docs.opencv.org/4.x/opencv.js"></script>

<script>
let video = document.getElementById('video');
let canvas = document.getElementById('canvas');
let ctx = canvas.getContext('2d');

let resultCanvas = document.getElementById('resultCanvas');

let stream;
let animationId;

let cvReady = false;

function waitForOpenCV() {
if (window.cv && cv.imread) {
cvReady = true;

document.getElementById('loading').classList.add('hidden');
document.getElementById('startScreen').classList.remove('hidden');

return;
}

setTimeout(waitForOpenCV, 300);
}

waitForOpenCV();

async function startCamera() {
try {
stream = await navigator.mediaDevices.getUserMedia({
video: {
facingMode: {
ideal: 'environment'
},
width: {
ideal: 1280
},
height: {
ideal: 720
}
},
audio: false
});

video.srcObject = stream;

await video.play();

video.onloadedmetadata = () => {
canvas.width = video.videoWidth;
canvas.height = video.videoHeight;

processFrame();
};

} catch (err) {
console.error(err);
alert('Camera failed. Ensure HTTPS and camera permissions are enabled.');
}
}

function processFrame() {
if (!video.videoWidth) {
animationId = requestAnimationFrame(processFrame);
return;
}

ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

animationId = requestAnimationFrame(processFrame);
}

// Start Button Required For iPhone Safari

document.getElementById('startBtn').addEventListener('click', async () => {
document.getElementById('startScreen').classList.add('hidden');
document.getElementById('scanner').classList.remove('hidden');

await startCamera();
});

// Capture

document.getElementById('captureBtn').addEventListener('click', () => {
cancelAnimationFrame(animationId);

resultCanvas.width = canvas.width;
resultCanvas.height = canvas.height;

let rctx = resultCanvas.getContext('2d');
rctx.drawImage(canvas, 0, 0);

// OpenCV filter
let src = cv.imread(resultCanvas);
let gray = new cv.Mat();
let thresh = new cv.Mat();

cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY);

cv.adaptiveThreshold(
gray,
thresh,
255,
cv.ADAPTIVE_THRESH_GAUSSIAN_C,
cv.THRESH_BINARY,
11,
2
);

cv.imshow(resultCanvas, thresh);

src.delete();
gray.delete();
thresh.delete();


document.getElementById('scanner').classList.add('hidden');
document.getElementById('result').classList.remove('hidden');
});

// Retake

document.getElementById('retakeBtn').addEventListener('click', () => {
document.getElementById('result').classList.add('hidden');
document.getElementById('scanner').classList.remove('hidden');

processFrame();
});

// Save

document.getElementById('saveBtn').addEventListener('click', () => {
let link = document.createElement('a');
link.download = `scan_${Date.now()}.png`;
link.href = resultCanvas.toDataURL('image/png');
link.click();
});

</script>

</body>
</html>
